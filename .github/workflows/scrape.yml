name: Scrape MTGO Decklists

on:
  schedule:
    - cron: '48 */4 * * *'  # every 4 hours at :48
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Download scraper release
        run: |
          curl -fL -o scraper.zip https://github.com/danzel/MtgoDecklistScraper/releases/latest/download/MtgoDecklistScraperNet.zip
          mkdir -p scraper
          unzip -q scraper.zip -d scraper

      - name: Run scraper
        run: |
          # On the 1st and 2nd of the month also scrape the previous month to catch any late-published events.
          DAY=$(date -u +%d)
          if [ "$DAY" -le 2 ]; then
            PREV_YEAR=$(date -u -d "$(date -u +%Y-%m-01) -1 day" +%Y)
            PREV_MONTH=$(date -u -d "$(date -u +%Y-%m-01) -1 day" +%m)
            echo "Scraping previous month: $PREV_YEAR-$PREV_MONTH"
            dotnet scraper/publish/MtgoDecklistScraperNet.dll --year "$PREV_YEAR" --month "$PREV_MONTH"
          fi
          dotnet scraper/publish/MtgoDecklistScraperNet.dll

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update decklists $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

      - name: Add .nojekyll
        run: touch output/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
